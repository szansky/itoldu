name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build Windows app
        run: .\build_windows.ps1
        shell: pwsh
      - uses: actions/upload-artifact@v4
        with:
          name: I-Told-U-windows
          path: dist/I-Told-U

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y portaudio19-dev python3-tk xclip xdotool
      - name: Build Linux app
        run: bash build_linux.sh
      - uses: actions/upload-artifact@v4
        with:
          name: I-Told-U-linux
          path: dist/i-told-u
